<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Surround Workbench — 7.1 speaker layout">
  <title>Surround Workbench</title>
  <defs>
    <radialGradient id="tileBg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1c2126"/>
      <stop offset="55%" stop-color="#101216"/>
      <stop offset="100%" stop-color="#070809"/>
    </radialGradient>
    <radialGradient id="speakerGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="60%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#0F9A6E"/>
    </radialGradient>
    <radialGradient id="lfeGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#0EA5A5"/>
    </radialGradient>
    <radialGradient id="listenerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#34D399"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="url(#tileBg)"/>

  <!-- Subtle inner border to suggest depth -->
  <rect x="2" y="2" width="252" height="252" rx="50" ry="50" fill="none" stroke="#34D399" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Sound field rings -->
  <g fill="none" stroke="#34D399" stroke-linecap="round">
    <circle cx="128" cy="128" r="58" stroke-opacity="0.10" stroke-width="1.2" stroke-dasharray="1 4"/>
    <circle cx="128" cy="128" r="80" stroke-opacity="0.16" stroke-width="1.4" stroke-dasharray="2 5"/>
    <circle cx="128" cy="128" r="102" stroke-opacity="0.22" stroke-width="1.6" stroke-dasharray="3 6"/>
  </g>

  <!-- Listener (head) silhouette at the centre -->
  <g filter="url(#softGlow)">
    <circle cx="128" cy="128" r="11" fill="url(#listenerGrad)"/>
    <circle cx="128" cy="128" r="4.5" fill="#0b0b0d"/>
  </g>

  <!-- Subtle forward indicator (faces FC) -->
  <path d="M 128 113 L 124.5 119 L 131.5 119 Z" fill="#0b0b0d" opacity="0.85"/>

  <!--
    7 main speakers arranged around the listener (radius 92).
    Angles measured from 12 o'clock (front):
      FC  =   0°
      FL  = -30°
      FR  = +30°
      SL  = -90°
      SR  = +90°
      RL  = -150°
      RR  = +150°
    Positions precomputed.
  -->
  <g>
    <!-- FC -->
    <g transform="translate(128 36)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
    <!-- FL -->
    <g transform="translate(82 52)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
    <!-- FR -->
    <g transform="translate(174 52)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
    <!-- SL -->
    <g transform="translate(36 128)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
    <!-- SR -->
    <g transform="translate(220 128)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
    <!-- RL -->
    <g transform="translate(82 204)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
    <!-- RR -->
    <g transform="translate(174 204)">
      <circle r="14" fill="url(#speakerGrad)"/>
      <circle r="5.5" fill="#0b0b0d"/>
      <circle r="2"   fill="#34D399" opacity="0.6"/>
    </g>
  </g>

  <!-- LFE subwoofer — wider cabinet, forward of listener -->
  <g transform="translate(128 90)">
    <rect x="-19" y="-11" width="38" height="22" rx="5" fill="url(#lfeGrad)"/>
    <circle cx="-9"  cy="0" r="5"  fill="#0b0b0d"/>
    <circle cx="-9"  cy="0" r="1.6" fill="#5EEAD4" opacity="0.7"/>
    <circle cx="9"   cy="0" r="5"  fill="#0b0b0d"/>
    <circle cx="9"   cy="0" r="1.6" fill="#5EEAD4" opacity="0.7"/>
  </g>

  <!-- "7.1" wordmark -->
  <g>
    <rect x="103" y="226" width="50" height="20" rx="10" fill="#0b0b0d" stroke="#34D399" stroke-opacity="0.35" stroke-width="1"/>
    <text x="128" y="241"
          text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Mono', monospace"
          font-size="13"
          font-weight="700"
          letter-spacing="2"
          fill="#34D399">7.1</text>
  </g>
</svg>

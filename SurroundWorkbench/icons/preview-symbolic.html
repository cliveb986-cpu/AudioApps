<!doctype html>
<html><head><meta charset="utf-8"><style>
  :root{font-family:sans-serif}
  html,body{margin:0;background:#1d1f21;color:#ddd;min-height:100vh}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:32px;align-items:end;justify-items:center}
  .swatch{display:flex;flex-direction:column;align-items:center;gap:8px}
  .px16  img{width:16px;height:16px}
  .px24  img{width:24px;height:24px}
  .px32  img{width:32px;height:32px}
  .px64  img{width:64px;height:64px}
  /* Apply GTK-style recolouring via CSS filter so we can preview light + dark panels */
  .dark   img{filter:invert(0.92) brightness(1.1)}    /* recolour dark icon to near-white for dark panel */
  .light  img{filter:none}                            /* dark icon on light panel */
  .accent img{filter:invert(0.7) sepia(1) hue-rotate(110deg) saturate(4) brightness(1.1)} /* GNOME accent (teal) */

  .panel-dark   {background:#1d1f21;padding:16px;border-radius:8px}
  .panel-light  {background:#e6e6e6;padding:16px;border-radius:8px;color:#222}
  .panel-accent {background:#0a3a2a;padding:16px;border-radius:8px}
  .label{font-size:12px;opacity:.7}
</style></head>
<body>
  <h2 style="padding:24px 32px 0;margin:0">surround-workbench-symbolic.svg — GNOME panel preview</h2>
  <div class="board">
    <div class="swatch px16 dark"   ><div class="panel-dark"   ><img src="surround-workbench-symbolic.svg"></div><div class="label">16 px · dark panel</div></div>
    <div class="swatch px24 dark"   ><div class="panel-dark"   ><img src="surround-workbench-symbolic.svg"></div><div class="label">24 px · dark panel</div></div>
    <div class="swatch px32 dark"   ><div class="panel-dark"   ><img src="surround-workbench-symbolic.svg"></div><div class="label">32 px · dark panel</div></div>
    <div class="swatch px64 dark"   ><div class="panel-dark"   ><img src="surround-workbench-symbolic.svg"></div><div class="label">64 px · dark panel</div></div>

    <div class="swatch px16 light"  ><div class="panel-light"  ><img src="surround-workbench-symbolic.svg"></div><div class="label">16 px · light panel</div></div>
    <div class="swatch px24 light"  ><div class="panel-light"  ><img src="surround-workbench-symbolic.svg"></div><div class="label">24 px · light panel</div></div>
    <div class="swatch px32 light"  ><div class="panel-light"  ><img src="surround-workbench-symbolic.svg"></div><div class="label">32 px · light panel</div></div>
    <div class="swatch px64 light"  ><div class="panel-light"  ><img src="surround-workbench-symbolic.svg"></div><div class="label">64 px · light panel</div></div>

    <div class="swatch px16 accent" ><div class="panel-accent" ><img src="surround-workbench-symbolic.svg"></div><div class="label">16 px · accent (teal)</div></div>
    <div class="swatch px24 accent" ><div class="panel-accent" ><img src="surround-workbench-symbolic.svg"></div><div class="label">24 px · accent</div></div>
    <div class="swatch px32 accent" ><div class="panel-accent" ><img src="surround-workbench-symbolic.svg"></div><div class="label">32 px · accent</div></div>
    <div class="swatch px64 accent" ><div class="panel-accent" ><img src="surround-workbench-symbolic.svg"></div><div class="label">64 px · accent</div></div>
  </div>
</body></html>

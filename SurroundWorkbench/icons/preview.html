<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#222;display:flex;gap:24px;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#ddd}
  .swatch{display:flex;flex-direction:column;align-items:center;gap:8px}
  .small{width:48px;height:48px} .mid{width:96px;height:96px} .big{width:256px;height:256px}
  img{display:block;border-radius:12px}
  .label{font-size:12px;opacity:.7}
</style></head>
<body>
  <div class="swatch"><img class="small" src="surround-workbench.svg"><div class="label">48 px (Activities)</div></div>
  <div class="swatch"><img class="mid"   src="surround-workbench.svg"><div class="label">96 px (app grid)</div></div>
  <div class="swatch"><img class="big"   src="surround-workbench.svg"><div class="label">256 px (raw)</div></div>
</body></html>
